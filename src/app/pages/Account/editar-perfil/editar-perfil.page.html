<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>editarPerfil</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <ion-header collapse="condense">
    <ion-toolbar>
      <ion-title size="large">editarPerfil</ion-title>
    </ion-toolbar>
  </ion-header>
  <form [formGroup]="editPerfilForm">
    <ion-img [src]="profileImage()" width="50" height="50" (click)="openCamera()"></ion-img>
    <ion-item>
      <ion-label>
        Nombres
        <ion-note [class.form-error-message]="isNameRequired">*</ion-note>
        <div>
          <ion-input
            type="text"
            formControlName="names"
            clearInput="true"
            [class.form-error-input]="isNameRequired"
            aria-required="true"
          ></ion-input>
        </div>
        @if (isNameRequired) {
        <ion-text color="danger">Los nombres son obligatorios.</ion-text>
        }
      </ion-label>
    </ion-item>
    <ion-item>
      <ion-label>
        Apellidos
        <ion-note [class.form-error-message]="isSurnamesRequired">*</ion-note>
        <div>
          <ion-input
            type="text"
            formControlName="surnames"
            clearInput="true"
            [class.form-error-input]="isSurnamesRequired"
            aria-required="true"
          ></ion-input>
        </div>
        @if (isSurnamesRequired) {
        <ion-text color="danger">Los apellidos son obligatorios.</ion-text>
        }
      </ion-label>
    </ion-item>
    <ion-item>
      <ion-label>
        Correo Electrónico
        <ion-note [class.form-error-message]="isEmailRequired">*</ion-note>
        <div>
          <ion-input
            type="email"
            formControlName="email"
            clearInput="true"
            [class.form-error-input]="isEmailRequired"
            aria-required="true"
            aria-readonly="true"
            readonly
          ></ion-input>
        </div>
        @if (isEmailRequired) {
        <ion-text color="danger"
          >El correo electrónico es obligatorio.</ion-text
        >
        }
      </ion-label>
    </ion-item>
    <ion-item>
      <ion-label>
        Dirección
        <div>
          <ion-input
            type="text"
            formControlName="address"
            clearInput="true"
          ></ion-input>
        </div>
      </ion-label>
    </ion-item>
  </form> 
</ion-content>
